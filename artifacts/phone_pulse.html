<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phone Macro Pulse</title>
<style>
:root {
  --bg: #2b2f3a;
  --panel: #313644;
  --text: #d8dee9;
  --muted: #a7b1c2;
  --border: #4c566a;
  --accent: #88c0d0;
  --good: #a3be8c;
  --warn: #ebcb8b;
  --bad: #bf616a;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 20px;
  background: var(--bg);
  color: var(--text);
  font-family: monospace;
  font-size: 18px;
  line-height: 1.6;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.header {
  color: var(--accent);
  font-weight: bold;
  font-size: 1.15rem;
  margin-bottom: 12px;
}
pre {
  white-space: pre-wrap;
  margin: 0;
  font-size: 17px;
  line-height: 1.65;
}
</style>
</head>
<body>
  <div class="card">
    <div class="header">Phone Macro Pulse</div>
    <pre></pre>
  </div>
</body>
</html>
